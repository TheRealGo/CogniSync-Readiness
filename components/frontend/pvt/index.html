<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e1117;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 420px;
    user-select: none;
    outline: none;
  }
  #start-btn {
    padding: 16px 48px;
    font-size: 20px;
    background: #ff4b4b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  #start-btn:hover { background: #ff6b6b; }
  .fixation { font-size: 80px; color: #555; font-weight: 300; }
  .counter {
    font-size: 64px;
    color: #ff4b4b;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }
  .result { font-size: 48px; font-weight: bold; }
  .good { color: #00d26a; }
  .minor { color: #ffd700; }
  .major { color: #ff4b4b; }
  .fs { color: #ff8c00; }
  .label { font-size: 16px; color: #888; margin-top: 12px; }
  .progress {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 14px;
    color: #555;
  }
  .complete-title { font-size: 36px; color: #4b9dff; font-weight: bold; }
</style>
</head>
<body tabindex="0">

<div id="progress" class="progress"></div>
<div id="main"></div>
<div id="sub" class="label"></div>

<script>
(function() {
  function postMsg(type, data) {
    window.parent.postMessage(
      Object.assign({isStreamlitMessage: true, type: type}, data), "*"
    );
  }
  const Streamlit = {
    setComponentReady() { postMsg("streamlit:componentReady", {apiVersion: 1}); },
    setFrameHeight(h) { postMsg("streamlit:setFrameHeight", {height: h}); },
    setComponentValue(v) { postMsg("streamlit:setComponentValue", {value: v}); },
  };

  let numTrials = 10;
  let trials = [];
  let trialIdx = 0;
  let phase = "init";
  let isiTimer = null;
  let animFrame = null;
  let counterStart = 0;
  let currentISI = 0;

  const main = document.getElementById("main");
  const sub = document.getElementById("sub");
  const progress = document.getElementById("progress");

  function showStart() {
    phase = "init";
    main.innerHTML = '<button id="start-btn">ここをクリックしてスタート</button>';
    sub.textContent = "スペースキーで反応します";
    document.getElementById("start-btn").addEventListener("click", function() {
      document.body.focus();
      nextTrial();
    });
  }

  function nextTrial() {
    if (trialIdx >= numTrials) { complete(); return; }
    progress.textContent = (trialIdx + 1) + " / " + numTrials;
    phase = "fixation";
    main.innerHTML = '<div class="fixation">+</div>';
    sub.textContent = "刺激を待ってください\u2026";
    currentISI = 2000 + Math.random() * 8000;
    isiTimer = setTimeout(showCounter, currentISI);
  }

  function showCounter() {
    phase = "stimulus";
    counterStart = performance.now();
    main.innerHTML = '<div class="counter" id="ctr">0000 ms</div>';
    sub.textContent = "\u30b9\u30da\u30fc\u30b9\u30ad\u30fc\u3092\u62bc\u3057\u3066\u304f\u3060\u3055\u3044\uff01";
    (function tick() {
      if (phase !== "stimulus") return;
      var el = document.getElementById("ctr");
      if (el) el.textContent = String(Math.round(performance.now() - counterStart)).padStart(4, " ") + " ms";
      animFrame = requestAnimationFrame(tick);
    })();
  }

  function respond() {
    if (phase === "fixation") {
      clearTimeout(isiTimer);
      trials.push({
        trial_number: trialIdx + 1,
        isi_ms: Math.round(currentISI),
        reaction_time_ms: null,
        is_false_start: true,
      });
      phase = "result";
      main.innerHTML = '<div class="result fs">FS</div>';
      sub.textContent = "\u30d5\u30a9\u30eb\u30b9\u30b9\u30bf\u30fc\u30c8";
      trialIdx++;
      setTimeout(nextTrial, 1500);

    } else if (phase === "stimulus") {
      cancelAnimationFrame(animFrame);
      var rt = performance.now() - counterStart;
      trials.push({
        trial_number: trialIdx + 1,
        isi_ms: Math.round(currentISI),
        reaction_time_ms: Math.round(rt * 10) / 10,
        is_false_start: false,
      });
      phase = "result";

      var cls = "good", lbl = "";
      if (rt > 500) { cls = "major"; lbl = "Major Lapse"; }
      else if (rt > 355) { cls = "minor"; lbl = "Minor Lapse"; }

      main.innerHTML = '<div class="result ' + cls + '">' + Math.round(rt) + ' ms</div>';
      sub.textContent = lbl;
      trialIdx++;
      setTimeout(nextTrial, 1500);
    }
  }

  function complete() {
    phase = "complete";
    main.innerHTML = '<div class="complete-title">\u30c6\u30b9\u30c8\u5b8c\u4e86</div>';
    sub.textContent = "\u7d50\u679c\u3092\u51e6\u7406\u4e2d\u2026";
    Streamlit.setComponentValue(trials);
  }

  document.addEventListener("keydown", function(e) {
    if (e.code === "Space") { e.preventDefault(); respond(); }
  });

  window.addEventListener("message", function(event) {
    if (event.data.type === "streamlit:render") {
      var args = event.data.args;
      if (args && args.num_trials) numTrials = args.num_trials;
      if (phase === "init") showStart();
      Streamlit.setFrameHeight(420);
    }
  });

  Streamlit.setComponentReady();
  Streamlit.setFrameHeight(420);
})();
</script>
</body>
</html>
